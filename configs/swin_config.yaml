# configs/swin_config.yaml
# Swin Transformer baseline. Thanks to the unified AutoModel loader, swapping
# the backbone is a one-line change in model_name.

run_name: "Swin_Comparison_Run"
data_dir: "data/Places2_simp"
log_dir: "results/runs"

model_name: "microsoft/swin-tiny-patch4-window7-224"
precision: "fp16"

epochs: 20
batch_size: 32

optimizer:
  name: "AdamW"
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  name: "cosine"

augmentations:
  - name: "RandomHorizontalFlip"
    params: {}
  - name: "ColorJitter"
    params: {brightness: 0.2, contrast: 0.2, saturation: 0.2}

seed: 42
patience: 5
